name: clean-api-starter-dev

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clean_api_starter}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - clean_api_starter_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-clean_api_starter};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-change-me-local-only}
      Jwt__Issuer: ${Jwt__Issuer:-CleanApiStarter}
      Jwt__Audience: ${Jwt__Audience:-CleanApiStarter.Client}
      Jwt__Secret: ${Jwt__Secret:-change-this-local-jwt-secret-at-least-32-characters}
      Jwt__ExpirationMinutes: ${Jwt__ExpirationMinutes:-60}
      Jwt__RefreshTokenExpirationDays: ${Jwt__RefreshTokenExpirationDays:-7}
      Seed__SuperAdminEmail: ${Seed__SuperAdminEmail:-admin@example.com}
      Seed__SuperAdminPassword: ${Seed__SuperAdminPassword:-ChangeMe123!}
      Seed__UserEmail: ${Seed__UserEmail:-user@example.com}
      Seed__UserPassword: ${Seed__UserPassword:-ChangeMe123!}
    ports:
      - "${API_HTTP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  clean_api_starter_postgres_data:
